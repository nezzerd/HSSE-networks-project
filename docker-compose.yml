services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-searchengine}
      POSTGRES_USER: ${DB_USER:-searchengine}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-searchengine} -d ${DB_NAME:-searchengine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-searchengine}
      DB_USER: ${DB_USER:-searchengine}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SEARCH_INDEX_PATH: /app/data/lucene-index
    volumes:
      - app-data:/app/data
    expose:
      - "8080"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal

volumes:
  pg-data:
  app-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
