spring:
  application:
    name: searchengine

  datasource:
    url: jdbc:h2:file:./data/searchengine;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false
    encoding: UTF-8

server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript
  error:
    whitelabel:
      enabled: false
  servlet:
    session:
      timeout: 30m
  max-http-request-header-size: 16KB
  tomcat:
    max-swallow-size: 2MB
    max-http-form-post-size: 256KB
    max-connections: 4000
    accept-count: 200
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 10s
    keep-alive-timeout: 15s
    max-keep-alive-requests: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /docs
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
  api-docs:
    path: /api-docs
    enabled: true
  show-actuator: false

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:}

crawler:
  max-pages: 5000
  max-depth: 5
  max-page-size-bytes: 2097152
  connect-timeout-ms: 10000
  read-timeout-ms: 10000
  max-redirects: 5
  politeness-delay-ms: 1000
  thread-pool-size: 8
  max-queue-size: 100000
  max-links-per-page: 500
  user-agent: "SearchEngineBot/1.0 (educational project; contact: admin@example.com)"
  simhash-threshold: 3
  simhash-candidates: 50
  recrawl-after-days: 7
  recrawl-batch-size: 500
  recrawl-cron: "0 0 3 * * *"

search:
  index-path: ./data/lucene-index
  max-results: 100
  snippet-length: 200
  page-size: 10
